# TikTok Affiliate Pipeline Configuration

research:
  products_per_niche_per_run: 20
  max_backlog_per_niche: 200
  min_affiliate_score: 6
  sources:
    - amazon
    - tiktok-shop

niches:
  - id: womens-fashion
    label: "Women's Fashion"
    account_id: womenswear-01
    template_id: swimwear-beach-v1
    tiktok_username: findwomenswear
    amazon_keywords: ["womens bikini", "one piece swimsuit", "swimwear women", "womens dress", "prom dress", "womens fashion"]
    amazon_category: "Clothing"
    price_min: 15
    price_max: 200
    commission_target_pct: 8

  - id: kitchen-gadgets
    label: "Kitchen Gadgets"
    account_id: kitchen-01
    template_id: kitchen-gadget-v1
    amazon_keywords: ["kitchen gadget", "cooking tool", "air fryer"]
    amazon_category: "Kitchen"
    price_min: 20
    price_max: 200
    commission_target_pct: 6

  - id: beauty-tools
    label: "Beauty Tools"
    account_id: beauty-01
    template_id: beauty-tools-v1
    amazon_keywords: ["makeup brush set", "skincare tool", "facial roller"]
    amazon_category: "Beauty"
    price_min: 10
    price_max: 80
    commission_target_pct: 12

posting:
  new_account_daily_limit: 3
  established_daily_limit: 6
  post_times: ["09:00", "14:00", "19:00"]
  model_rotation_window: 5

comfyui:
  host: "http://localhost:8188"
  timeout_seconds: 120
  output_dir: "assets"

slides:
  count_single_product: 7
  count_roundup: 8
  image_width: 1080
  image_height: 1920
  font_path: "assets/fonts/Inter-Bold.ttf"
  font_size_title: 72
  font_size_body: 48
  font_size_cta: 64
  text_color: "#FFFFFF"
  shadow_color: "#000000"
  cta_bg_color: "#FF0050"
